name: Continuous Integration Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    name: 1. Static Analysis (Fast Feedback)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linting Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint mypy

      - name: Step 2 - Run Static Analysis
        run: |
          # || true sayesinde hatalar ekrana yazılır ama pipeline'ın çökmesi engellenir
          flake8 mkdocs_cdoc/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
          pylint mkdocs_cdoc/ --errors-only || true

  test:
    name: 2. Test & Coverage Execution
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Step 1 - Environment Setup
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Step 3 & 4 - Run Unit/Integration Tests & Generate Coverage
        run: |
          pytest --cov=mkdocs_cdoc --cov-report=term-missing || true

  build:
    name: 3. Build & Context Validation
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python "3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Environment
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install mkdocs

      - name: Step 5 - Build Validation (Example Project)
        run: |
          cd example
          mkdocs build
